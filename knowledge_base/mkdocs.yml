site_name: Knowledge Base

site_url: https://bengravell.github.io/knowledge-base/

plugins:
  - search
  - macros
  - gen-files:
      scripts:
        - generate_papers.py
        - mind_map/copy_assets.py
        - content_tree/generate_content_tree_data.py

theme:
  name: material
  logo: icon.png
  favicon: favicon.png

  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

  font:
    text: Atkinson Hyperlegible Next
    code: Atkinson Hyperlegible Mono

  features:
    - content.code.annotate
    - content.tabs.link
    - metadata
    - navigation.indexes
    - tags
    - search.highlight

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - javascripts/header-link.js

markdown_extensions:
  - meta
  - admonition
  - footnotes
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences
  - pymdownx.snippets
  - attr_list
  - toc:
      permalink: true

