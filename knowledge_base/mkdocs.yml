site_name: Knowledge Base

site_url: https://bengravell.github.io/knowledge-base/

extra:
  generator: false

plugins:
  - search
  - macros
  - tree-nav:
      source: tree.yml
  - gen-files:
      scripts:
        - generate_papers.py
        - map/copy_assets.py
        - tree/generate_tree_data.py

theme:
  name: material
  logo: icon.png
  favicon: favicon.png

  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

  font:
    text: Atkinson Hyperlegible Next
    code: Atkinson Hyperlegible Mono

  features:
    - content.code.annotate
    - content.tabs.link
    - metadata
    - navigation.indexes
    - tags
    - search.highlight

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - javascripts/math-fit.js
  - javascripts/header-link.js

markdown_extensions:
  - meta
  - admonition
  - footnotes
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences
  - pymdownx.snippets
  - attr_list
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Map: map.md
  - Timeline: timeline.md
  - Tree: tree/index.md
  - Tag Search: tag-search.md
  - Analytics: analytics.md
  - Explainers:
    - Planning & Control:
      - PID: explainers/pid/pid.md
      - LQR: explainers/lqr.md
      - MPC: explainers/mpc.md
      - MCTS: explainers/mcts.md
      - Differential Flatness: explainers/differential_flatness.md
      - AkinoPDF: explainers/akino_pdf.md
      - Respect the Unstable: explainers/respect_the_unstable.md
      - Explorations in Dynamics: explainers/explorations_in_dynamics.md
      - Permutation-Invariant Neural Nets for RL: explainers/permutation_invariant_nn_rl.md
    - Optimization:
      - Gradient Descent under Polyak-Łojasiewicz: explainers/polyak_lojasiewicz.md
    - AI for Autonomy:
      - Waymo AI: explainers/waymo_ai.md
      - Adversarial Training and Robot Safety: explainers/adversarial_training_robot_safety.md
  - Software:
    - Art & Practice: programming/art_and_practice.md
    - "C++": programming/cpp.md
    - Python: programming/python.md
    - Interoperability: programming/interoperability.md
    - Trajectory Optimization: programming/trajectory_optimization.md
  - Credits: credits.md
  - Portfolio: https://bengravell.github.io/portfolio/
