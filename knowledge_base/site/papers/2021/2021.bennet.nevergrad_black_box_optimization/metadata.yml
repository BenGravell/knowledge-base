abstract: >
  Nevergrad is an open source platform for black-box optimization. Join the user group! And if you like Nevergrad, please support us by adding a star on GitHub (https://github.com/facebookresearch/nevergrad).
summary: >
  Introduces Nevergrad as an open-source platform for black-box and derivative-free optimization, collecting optimizers, benchmark tooling, and practical interfaces in one package. The article is less a theoretical algorithm paper than a software reference for experimentation across noisy, parallel, discrete, continuous, structured, and multiobjective optimization settings.
