abstract: >
  In path-following the control objective is to force the output to follow a geometric path without a
  timing law assigned to it. We highlight a fundamental difference between the path-following and the
  standard reference-tracking by demonstrating that performance limitation due to unstable
  zero-dynamics can be removed in the path-following problem.
summary: >
  Clarifies why geometric path following can avoid performance limits that constrain time-indexed
  reference tracking for nonminimum-phase systems. The core insight is that choosing the timing law
  gives the controller extra freedom to stabilize troublesome zero dynamics.
