title: "Kinodynamic Trajectory Optimization and Control for Car-Like Robots"
algorithm: TEB
authors:
  - Christoph Rösmann
  - Frank Hoffmann
  - Torsten Bertram
year: 2017
source: IEEE/RSJ International Conference on Intelligent Robots and Systems (IROS)
type: Conference Paper
doi: 10.1109/IROS.2017.8206458
tags:
