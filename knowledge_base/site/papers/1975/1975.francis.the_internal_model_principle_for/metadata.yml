abstract: >
  Necessary structural criteria are obtained for linear multivariable regulators which retain loop stability and output regulation in the presence of small perturbations, of specified types, in system parameters. It is shown that structural stability thus defined requires feedback of the regulated variable, together with a suitably reduplicated model, internal to the feedback loop, of the dynamic structure of the exogenous reference and disturbance signals which the regulator is required to process. Necessity of these structural features constitutes the &#8216;internal model principle&#8217;.
