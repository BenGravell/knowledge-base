abstract: >
summary: >
  Develops a methodology for designing linear regulators for nonlinear stochastic systems by linearizing about a nominal trajectory and applying LQR synthesis to the resulting linear stochastic model. Provides a practical design framework for near-optimal control of nonlinear systems encountered in aerospace applications.
