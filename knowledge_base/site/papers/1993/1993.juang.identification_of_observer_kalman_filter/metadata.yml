abstract: >
  This paper discusses an algorithm to compute the Markov parameters of an observer or Kalman filter from experimental input and output data. The Markov parameters can then be used for identification of a state space representation, with associated Kalman gain or observer gain, for the purpose of controller design.
summary: >
  Introduces OKID (Observer/Kalman Filter Identification), extending the Eigensystem Realization Algorithm (ERA) to handle arbitrary input-output time series rather than only impulse responses. By identifying Observer Markov Parameters, OKID simultaneously recovers both the state-space model and a Kalman gain from data, making system identification practical in the same setting as DMD and SINDy.
