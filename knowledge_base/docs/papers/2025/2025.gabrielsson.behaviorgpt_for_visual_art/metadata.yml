abstract: >
  We introduce BehaviorGPT-v3, the first behavioral foundation model for visual art and aesthetics. Trained on 215 billion human interactions across major art and design platforms.
summary: >
  Presents BehaviorGPT-v3 as a behavior-first foundation model for visual art and aesthetics, trained on large-scale sequences of user interactions rather than only pixels or text-image pairs. The paper argues that aesthetic meaning depends heavily on user context and intent, and reports improvements in search, recommendation, dynamic categorization, SEO, assortment optimization, personalization, navigation, and motif generation.
