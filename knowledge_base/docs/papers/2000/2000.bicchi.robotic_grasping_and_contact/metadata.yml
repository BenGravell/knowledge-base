abstract: >
  In this paper, we survey the field of robotic grasping and the work that has been done in this area over the last two decades, with a slight bias toward the development of the theoretical framework and analytical results in this area.
summary: >
  Reviews classical robotic grasping research with emphasis on contact models, grasp analysis, and the analytical theory behind dexterous manipulation. It is a compact entry point into the pre-deep-learning literature on grasp stability, contact constraints, and robot hand mechanics.
