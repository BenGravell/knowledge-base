abstract: >
  In this paper, we propose a regularized Newton method without line search. The proposed method controls a regularization parameter instead of a step size in order to guarantee the global convergence. We show that the proposed algorithm has the following convergence properties. (a) The proposed algorithm has global convergence under appropriate conditions. (b) It has superlinear rate of convergence under the local error bound condition. (c) An upper bound of the number of iterations required to obtain an approximate solution x satisfying ||grad f(x)|| <= epsilon is O(epsilon^{-2}), where f is the objective function and epsilon is a given positive constant.
summary: >
  Ueda and Yamashita replace line-search step-size control with adaptation of a regularization parameter in Newton's method. The analysis gives global convergence, superlinear local convergence under an error-bound condition, and an iteration complexity bound for reaching a first-order approximate solution.
