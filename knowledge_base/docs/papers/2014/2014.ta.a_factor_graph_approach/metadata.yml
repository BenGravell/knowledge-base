title: >
  A factor graph approach to estimation and model predictive control on Unmanned Aerial Vehicles
algorithm:
authors:
  - Duy-Nguyen Ta
  - Marin Kobilarov
  - Frank Dellaert
year: 2014
source: 2014 International Conference on Unmanned Aircraft Systems (ICUAS)
type: Conference Paper
