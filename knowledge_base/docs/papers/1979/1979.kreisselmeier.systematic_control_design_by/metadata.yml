abstract: >
  An iterative procedure for control design is presented. By optimizing a vector performance index, the components of which rate different design specifications, free controller coefficients in a given control structure are determined in such a way that a systematic improvement of the result in each iteration step is guaranteed, even if a great many of design specifications have to be considered. Opposite to previous works, handling design specifications as constraints within the meaning of nonlinear programming the described procedure excels by high systematic policy for choosing free design parameters and by requiring only unconstrained minimization which can be realized comparatively simple.
summary: >
  Presents an iterative controller-tuning procedure that treats multiple design
  specifications as components of a vector performance index, choosing free
  controller parameters so that each iteration systematically improves the
  design. The method is notable for avoiding explicit nonlinear-programming
  constraints, reducing the design step to unconstrained minimization while
  still supporting many simultaneous performance requirements.
