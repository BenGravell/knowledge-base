abstract: >
  We present an iterative linear-quadratic-Gaussian method for locally-optimal feedback control of nonlinear stochastic systems subject to control constraints. Previously, similar methods have been restricted to deterministic unconstrained problems with quadratic costs. The new method constructs an affine feedback control law, obtained by minimizing a novel quadratic approximation to the optimal cost-to-go function. Global convergence is guaranteed through a Levenberg-Marquardt method; convergence in the vicinity of a local minimum is quadratic. Performance is illustrated on a limited-torque inverted pendulum problem, as well as a complex biomechanical control problem involving a stochastic model of the human arm, with 10 state dimensions and 6 muscle actuators. A Matlab implementation of the new algorithm is available at http://www.cogsci.ucsd.edu/~todorov.
summary: >
  Extends the earlier iLQR trajectory-optimization framework into an iterative LQG method for nonlinear stochastic systems with control constraints and control-dependent multiplicative noise. The paper shows how a local linear-quadratic approximation can account for noise whose variance depends on the control signal, producing affine feedback policies via modified Riccati-style backward passes and demonstrating the method on constrained pendulum and biomechanical arm-control examples.
