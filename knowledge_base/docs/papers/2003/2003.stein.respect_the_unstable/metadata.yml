abstract: >
  Control engineers often design feedback control systems for inherently unstable systems, to keep them operating safely. In such cases, there are fundamental limitations on the achievable sensitivity function. The article discusses the potentially serious consequences of sensitivity constraints, input saturation, and instability. Inadequacies of control systems in such cases have led to deaths.
summary: >
  Recasts unstable feedback-control design as a practical safety problem governed by unavoidable sensitivity and saturation trade-offs, using the Bode sensitivity integral as a memorable "conservation law" for control. The article connects these limits to high-consequence examples including inverted pendulums, unstable aircraft, and Chernobyl, arguing that engineers must teach and check fundamental limitations before trusting sophisticated synthesis tools.
