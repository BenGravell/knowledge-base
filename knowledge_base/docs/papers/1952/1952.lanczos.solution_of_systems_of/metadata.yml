title: Solution of Systems of Linear Equations by Minimized Iterations
algorithm: Lanczos minimized-iteration method
authors:
  - C. Lanczos
year: 1952
source: Journal of Research of the National Bureau of Standards
type: Journal Paper
doi: 10.6028/JRES.049.006
arxiv_id:
tags:
abstract: >
  A simple algorithm is described which is well adapted to the effective solution of large systems of linear algebraic equations by a succession of well-convergent approximations.
summary: >
  Seminal early formulation of Lanczos minimized-iteration method for solving linear systems, providing a bridge between direct elimination, conjugate gradient, and later Krylov subspace-based solvers.
