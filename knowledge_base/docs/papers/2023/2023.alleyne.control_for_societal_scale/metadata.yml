abstract: >
  The world faces some of its greatest challenges of modern time and how we address them will have a
  dramatic impact on the life for generations to come. Simultaneously, control systems, consisting of
  information enriched by various degrees of analytics followed by decision-making, are pervading a
  variety of sectors, not only in engineering but beyond, into financial services, socio-economic
  analysis, entertainment and sports, and political and social sciences. Increased levels of
  automation are sought after in various sectors and being introduced into new domains. All of these
  advances and transformations urge a shift in the conversation toward how control systems can meet
  grand societal-scale challenges. The document seeks to chart a roadmap for the evolution of control
  systems, identifying several areas where our discipline can have an impact over the next decade.
summary: >
  A community roadmap for control systems research oriented around large societal challenges such as
  transportation, energy, health, autonomy, and infrastructure. It is less a single technical
  contribution than a map of where control theory, automation, and decision-making may matter at
  scale.
