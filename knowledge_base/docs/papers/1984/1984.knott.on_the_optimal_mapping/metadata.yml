abstract: >
  We consider the problem of mapping X->Y, where X and Y have given distributions, so as to minimize the expected value of |X-Y|^2. This is equivalent to finding the joint distribution of the random variable (X, Y), with specified marginal distributions for X and Y, such that the expected value of |X-Y|^2 is minimized. We give a sufficient condition for the minimizing joint distribution and supply numerical results for two special cases.
summary: >
  Knott and Smith study the quadratic-cost Monge problem as a question about constructing a joint distribution with prescribed marginals. The paper is an early optimal-transport reference that anticipates later Wasserstein-map formulations by emphasizing sufficient optimality conditions and numerical examples for distribution mappings.
