title: >
  Autonomous Automobile Trajectory Tracking for Off-road Driving: Controller Design, Experimental Validation and Racing
algorithm:
authors:
  - Gabriel M. Hoffmann
  - Claire J. Tomlin
  - Michael Montemerlo
  - Sebastian Thrun
year: 2007
source: 2007 American Control Conference
