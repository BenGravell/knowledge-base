title: "Near Linear Time Algorithm to Detect Community Structures in Large-Scale Networks"
algorithm: "Label Propagation Algorithm"
authors:
  - Usha Nandini Raghavan
  - Reka Albert
  - Soundar Kumara
year: 2007
source: Physical Review E
type: Journal Paper
doi: 10.1103/PhysRevE.76.036106
arxiv_id: "0709.2938"
tags:
