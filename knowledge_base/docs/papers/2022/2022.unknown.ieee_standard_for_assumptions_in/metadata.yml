abstract: >
  This standard applies to road vehicles. It defines a minimum set of reasonable assumptions and foreseeable scenarios that shall be considered in the development of safety related models that are part of an automated driving system (ADS).
summary: >
  IEEE Std 3079-2022 defines the minimum set of assumptions and foreseeable scenarios that must be considered when developing safety-related models for automated driving systems, providing a normative baseline for ADS safety analysis.
