title: "QuickMatch: A Very Fast Algorithm for the Assignment Problem"
algorithm: "QuickMatch"
authors:
  - James B. Orlin
  - Yusin Lee
year: 1993
source: MIT Sloan School of Management
type: Technical Report
tags:
