summary: >
  Introduces evolutionary programming as an artificial intelligence method that treats intelligence as adaptive behavior produced by simulated evolution. The book develops populations of finite-state predictor machines, mutates their transition structures, and selects them by predictive performance, establishing one of the founding branches of evolutionary computation alongside later genetic algorithms and evolution strategies.
