abstract: > 
  Essentially, this essay contains nothing new, on the contrary: its subject matter is so old, that sometimes it seems forgotten. It is written in an effort to undo some of the more common misunderstandings that I encounter (nearly daily) in my professional world of computing scientists, programmers, computer users and computer designers, and even colleagues engaged in educational politics. The decision to write this essay now was taken because I suddenly realized that my confrontation with this same pattern of misunderstanding was becoming a regularly itself repeating occurrence. Whether the misappreciation of the proper role of scientific thought that I observe within the "computing community" is a phenomenon that is specific for the computing community, or whether it also a current phenomenon in other disciplines, is not for me to judge. One thing seems certain: in the computing community itself we can find enough historical explanation, and we don't need to look for outside influences when we try to understand how the phenomenon came about. (This is not meant to say, that those outside influences have been absent!)
summary: >
  Dijkstra coined the phrase "the separation of concerns": the deliberate isolation of one aspect of a problem for study in its own right, while setting other aspects temporarily aside. He argues that faithfullly adhering to this principle is a key aspect of organizing code, logic, data, and ideas in an efficient and understandable way (the "effective ordering of one's thoughts"). Extremely influential in the field of computer programming and software design.
