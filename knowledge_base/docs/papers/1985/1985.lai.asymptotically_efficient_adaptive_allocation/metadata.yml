abstract: >
  Let Pi_j (j = 1, ..., k) denote statistical populations (treatments, manufacturing processes, etc.) specified respectively by univariate density functions f(x; theta_j) with respect to some measure nu, where f(.; .) is known and the theta_j are unknown parameters belonging to some set Theta. Assume that integral from -infinity to infinity of |x|f(x; theta) dnu(x) < infinity for all theta in Theta. How should we sample x_1, x_2, ... sequentially from the k populations in order to achieve the greatest possible expected value of the sum S_n = x_1 + ... + x_n as n -> infinity? Starting with [3] there has been a considerable literature on this subject, which is often called the multi-armed bandit problem. The name derives from an imagined slot machine with k >= 2 arms. (Ordinary slot machines with one arm are one-armed bandits, since in the long run they are as effective as human bandits in separating the victim from his money.) When an arm is pulled, the player wins a random reward. For each arm j there is an unknown probability distribution Pi_j of the reward. The player wants to choose at each stage one of the k arms, the choice depending in some way on the record of previous trials, so as to maximize the long-run total expected reward. A more worthy setting for this problem is in the context of sequential clinical trials, where there are k treatments of unknown efficacy to be used in treating a long sequence of patients. An adaptive allocation rule phi is a sequence of random variables phi_1, phi_2, ... taking values in the set {1, ..., k} and such that the event {phi_n = j} ("sample from Pi_j at stage n") belongs to the sigma-field F_{n-1} generated by the previous values phi_1, x_1, ..., phi_{n-1}, x_{n-1}. In this paper we develop a new approach for constructing rather simple rules that are asymptotically efficient. Our approach is based on a certain class of upper confidence bounds, and the idea is described in general in Section 3. Applications to the special cases of normal, Bernoulli, Poisson, and exponential populations are discussed in Section 4.
