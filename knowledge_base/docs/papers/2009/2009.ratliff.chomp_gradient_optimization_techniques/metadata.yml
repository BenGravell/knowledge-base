title: "CHOMP: Gradient Optimization Techniques for Efficient Motion Planning"
algorithm: CHOMP
authors:
  - Nathan Ratliff
  - Matt Zucker
  - J. Andrew Bagnell
  - Siddhartha Srinivasa
year: 2009
source: IEEE International Conference on Robotics and Automation (ICRA)
type: Conference Paper
doi: 10.1109/ROBOT.2009.5152817
tags:
  - Motion planning
