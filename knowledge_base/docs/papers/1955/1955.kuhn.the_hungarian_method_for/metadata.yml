title: "The Hungarian Method for the Assignment Problem"
algorithm: Hungarian algorithm
authors:
  - Harold W. Kuhn
year: 1955
source: Naval Research Logistics Quarterly
type: Journal Paper
doi: 10.1002/nav.3800020109
tags:
  - Assignment problem
