abstract: > 
  Many reinforcement learning (RL) research papers contain paragraphs that define Markov decision processes (MDPs). These paragraphs take up space that could otherwise be used to present more useful content. In this paper we specify a notation for MDPs that can be used by other papers. Declaring the use this notation using a single sentence can replace several paragraphs of notational specifications in other papers. Importantly, the notation that we define is a common foundation that appears in many RL papers, and is not meant to be a complete notation for an entire paper. We refer to our notation as the Markov Decision Process Notation, version 1 or MDPNv1. It can be invoked in research papers with the sentence: “We use the notational standard MDPNv1.” This sentence denotes that the notation specified in this document should be inserted at the current location. One challenge with this system is that any reasonably complete notation will define a large subset of the commonly used mathematical symbols, some of which an author may wish to use with a meaning other than that specified in MDPNv1. To overcome this problem, definitions that occur after the sentence invoking MDPNv1 can modify or overwrite the definitions in MDPNv1. For example, an author may write “We assume that the state and action sets are finite,” which overrules MDPNv1's more general definition of the state and action sets, or “Let A denote the set of all possible advantage functions,” which overwrites the definition of A in MDPNv1 (where it is the set of possible actions). In general, MDPNv1 should serve as a notational foundation, which the author is free to build upon or remove from to best suit the needs of the paper.
