title: "Discovering Governing Equations from Data: Sparse Identification of Nonlinear Dynamical Systems"
algorithm: SINDy
authors:
  - Steven L. Brunton
  - Joshua L. Proctor
  - J. Nathan Kutz
year: 2015
source: Proceedings of the National Academy of Sciences (PNAS)
type: Journal Paper
doi: 10.1073/pnas.1517384113
arxiv_id: 1509.03580
tags:
  - System identification
  - Sparse regression
  - SINDy
  - Nonlinear dynamics
  - Data-driven methods
abstract: >
  Extracting governing equations from data is a central challenge in many diverse areas of science and engineering. Data are abundant whereas models often remain elusive, as in climate science, neuroscience, ecology, finance, and epidemiology, to name only a few examples. In this work, we combine sparsity-promoting techniques and machine learning with nonlinear dynamical systems to discover governing equations from noisy measurement data. The only assumption about the structure of the model is that there are only a few important terms that govern the dynamics, so that the equations are sparse in the space of possible functions; this assumption holds for many physical systems in an appropriate basis. In particular, we use sparse regression to determine the fewest terms in the dynamic governing equations required to accurately represent the data. This results in parsimonious models that balance accuracy with model complexity to avoid overfitting. We demonstrate the algorithm on a wide range of problems, from simple canonical systems, including linear and nonlinear oscillators and the chaotic Lorenz system, to the fluid vortex shedding behind an obstacle. The fluid example illustrates the ability of this method to discover the underlying dynamics of a system that took experts in the community nearly 30 years to resolve. We also show that this method generalizes to parameterized systems and systems that are time-varying or have external forcing.
summary: >
  Introduces SINDy, which applies sparse regression over a library of candidate nonlinear functions to identify parsimonious governing equations from trajectory data, recovering interpretable symbolic expressions for nonlinear dynamical systems.
