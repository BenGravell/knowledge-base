abstract:
summary: >
  The canonical reference for Classification and Regression Trees (CART), introducing binary recursive partitioning with Gini impurity for classification and variance reduction for regression, cross-validation-based pruning, and handling of missing values. Defines the mathematical and algorithmic foundations that underpin most modern tree-based methods including Random Forests and gradient boosting.
