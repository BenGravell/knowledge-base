abstract: >
  A new methodology for constructing convex optimization models called disciplined convex programming
  is introduced. The methodology enforces a set of conventions upon the models constructed, in turn
  allowing much of the work required to analyze and solve the models to be automated.
summary: >
  Defines disciplined convex programming: a grammar of convex expressions that lets modeling tools
  verify convexity and canonicalize problems automatically. This paper is the conceptual foundation
  for CVX-style modeling systems and later tools such as CVXPY.
