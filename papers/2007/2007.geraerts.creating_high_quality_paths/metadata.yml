title: "Creating High-quality Paths for Motion Planning"
algorithm: 
authors:
  - Roland Geraerts
  - Mark H. Overmars
year: 2007
source: The International Journal of Robotics Research (IJRR)
type: Jounral Article
doi: 10.1177/0278364907079280
tags:
  - Motion planning
