abstract:
summary: >
  Defines the Shapley Value, a unique allocation rule for cooperative n-player games derived from four axioms: efficiency, symmetry, the null player property, and additivity. The Shapley value assigns each player a fair share of the total coalition value based on their marginal contributions across all possible orderings. It became the mathematical foundation for SHAP feature attribution in machine learning.
