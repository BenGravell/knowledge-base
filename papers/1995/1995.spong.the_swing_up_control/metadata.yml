title: "The Swing up Control Problem for the Acrobot"
algorithm: "Energy-Based Swing-Up Control"
authors:
  - Mark W. Spong
year: 1995
source: IEEE Control Systems
type: Journal Paper
doi: 10.1109/37.341864
tags:
