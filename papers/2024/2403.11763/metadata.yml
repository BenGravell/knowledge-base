abstract: >
  We study the problem of co-designing control barrier functions (CBF) and linear state feedback
  controllers for continuous-time linear systems. We achieve this by means of a single semi-definite
  optimization program. Our formulation can handle mixed-relative degree problems without requiring an
  explicit safe controller. Different L-norm based input limitations can be introduced as convex
  constraints in the proposed program. We demonstrate our results on an omni-directional car numerical
  example.
summary: >
  Formulates joint CBF and linear feedback-controller synthesis for linear systems as a semidefinite
  program, including input constraints and mixed-relative-degree safe sets. The useful idea is
  treating safe-set certificate design and controller design as one convex co-design problem.
