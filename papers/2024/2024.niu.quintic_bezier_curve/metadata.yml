abstract: >
  This paper proposes a novel optimal global path planning approach with operational constraints based on a parameterized quintic Bezier transition scheme, which allows for quick and accurate solution of optimal paths involving multiple constraints. The approach develops an elaborately parameterized quintic Bezier transition curve with a closed form that can satisfy curvature constraints at the vibroseis source points without redundant calculations.
summary: >
  Applies parameterized quintic Bezier transition curves to globally optimal path planning for seismic exploration vehicles, satisfying curvature constraints at survey points in closed form without iterative calculation. The method achieves measurable improvements in operational efficiency and precision over prior approaches.
