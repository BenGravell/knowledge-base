title: "N4SID: Numerical Algorithms for State Space Subspace System Identification"
algorithm: N4SID
authors:
  - Peter Van Overschee
  - Bart De Moor
year: 1994
source: IFAC World Congress
type: Conference Paper
doi: 10.1016/S1474-6670(17)48221-8
arxiv_id:
tags:
  - System identification
  - Subspace identification
  - Subspace methods
  - State space models
  - N4SID
abstract: >
  We present a new dynamical system identification algorithm. In this new framework, the concept of a state is emphasized.
summary: >
  Introduces the N4SID algorithm, which identifies linear state-space models from input-output data using projections of block Hankel matrices, providing a numerically robust approach to subspace system identification.
