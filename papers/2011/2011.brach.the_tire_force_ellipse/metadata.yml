abstract: >
  The tire force developed over, and acting tangent to, the tire contact patch plane provides
  directional control of a vehicle as well as braking and acceleration traction. For analysis and
  modeling, this force is usually broken into its components, Fx and Fy. The former is the force
  component along the heading axis of the tire and supplies traction, whereas the latter is the force
  component perpendicular to the heading axis of the tire and controls steering. The resultant of
  these two forces is limited in magnitude by the tire characteristics, the tire-surface sliding
  friction and the normal force. Comparisons of the idealized tire-force circle/ellipse using a simple
  bilinear tire force model and using actual tire data show that it provides only a limited,
  simplified notion of combined tire forces due to its lack of dependence upon the slip angle and
  traction slip. Furthermore, these comparisons show that the idealized tire-force circle/ellipse does
  not represent actual tire behavior, even approximately, since it is incapable of modeling the
  nonlinear behavior of tires.
summary: >
  Examines the popular friction-ellipse abstraction against simple and measured tire-force behavior.
  The paper is a useful caution that the ellipse is a qualitative force-limit picture, not a faithful
  model of nonlinear combined-slip tire dynamics.
