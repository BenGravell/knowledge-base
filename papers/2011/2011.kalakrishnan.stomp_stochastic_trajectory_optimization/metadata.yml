title: "STOMP: Stochastic Trajectory Optimization for Motion Planning"
algorithm: STOMP
authors:
  - Mrinal Kalakrishnan
  - Sachin Chitta
  - Evangelos Theodorou
  - Peter Pastor
  - Stefan Schaal
year: 2011
source: IEEE International Conference on Robotics and Automation (ICRA)
type: Conference Paper
doi: 10.1109/ICRA.2011.5980280
tags:
  - Motion planning
  - Path planning
  - Path optimization
  - Stochastic optimization
  - Path integral
