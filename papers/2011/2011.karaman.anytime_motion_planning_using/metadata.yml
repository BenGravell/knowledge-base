  - Emilio Frazzoli
  - Seth Teller
year: 2011
source: IEEE International Conference on Robotics and Automation (ICRA)
type: Conference Paper
doi: 10.1109/ICRA.2011.5980479
tags:
  - Motion planning
  - Anytime
  - Asymptotically optimal
  - Probabilistically complete
