title: "A Multiple-Shooting Differential Dynamic Programming Algorithm. Part 1: Theory"
algorithm: MS-DDP
authors:
  - Etienne Pellegrini
  - Ryan P. Russell
year: 2020
source: Acta Astronautica
type: Journal Paper
doi: 10.1016/j.actaastro.2019.12.037
arxiv_id:
tags:
  - Differential dynamic programming
