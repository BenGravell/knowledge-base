title: >
  Understanding How Dimension Reduction Tools Work: An Empirical Approach to Deciphering t-SNE, UMAP, TriMAP, and PaCMAP for Data Visualization
algorithm:
authors:
  - Yingfan Wang
  - Haiyang Huang
  - Cynthia Rudin
  - Yaron Shaposhnik
year: 2020
source:
type: ''
