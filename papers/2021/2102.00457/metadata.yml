title: >
  MultiRocket: Multiple pooling operators and transformations for fast and effective time series classification
algorithm:
authors:
  - Chang Wei Tan
  - Angus Dempster
  - Christoph Bergmeir
  - Geoffrey I. Webb
year: 2021
source:
type: ''
