title: "Trajectory Generation for Car-Like Robots Using Cubic Curvature Polynomials"
algorithm: Cubic Curvature Polynomials
authors:
  - Bryan Nagy
  - Alonzo Kelly
year: 2001
source: Field and Service Robots (FSR)
type: Conference Paper
doi:
arxiv_id:
tags:
  - Path planning
