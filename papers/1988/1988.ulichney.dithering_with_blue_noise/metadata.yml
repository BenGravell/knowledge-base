abstract: >
  Digital halftoning, also referred to as spatial dithering is a method of rendering the illusion of continuous-tone pictures on displays that are capable of only producing binary picture elements. The concept of blue noise-high-frequency white noise-is introduced and found to have desirable properties for halftoning. Efficient algorithms for dithering with blue noise, based on perturbed error diffusion, are developed. The nature of dither patterns produced is extensively examined in the frequency domain. Metrics for analyzing the frequency content of aperiodic patterns for both rectangular and hexagonal grids are developed; blue-noise dithering is found to be ideally suited for rectangular grids. Several carefully selected digitally produced examples are included.< <ETX xmlns:mml="http://www.w3.org/1998/Math/MathML" xmlns:xlink="http://www.w3.org/1999/xlink">&gt;</ETX>
