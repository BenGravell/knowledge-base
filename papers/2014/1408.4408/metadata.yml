title: "A Data-Driven Approximation of the Koopman Operator: Extending Dynamic Mode Decomposition"
algorithm: eDMD
authors:
  - Matthew O. Williams
  - Ioannis G. Kevrekidis
  - Clarence W. Rowley
year: 2014
source: Journal of Nonlinear Science
type: Journal Paper
doi: 10.1007/s00332-015-9258-5
arxiv_id: "1408.4408"
tags:
  - Koopman operator
