title: "Informed RRT*: Optimal Sampling-based Path Planning Focused via Direct Sampling of an Admissible Ellipsoidal Heuristic"
algorithm: Informed RRT*
authors:
  - Jonathan D. Gammell
  - Siddhartha S. Srinivasa
  - Timothy D. Barfoot
year: 2014
source: IEEE/RSJ International Conference on Intelligent Robots and Systems (IROS)
type: Conference Paper
doi: 10.1109/IROS.2014.6942976
arxiv_id: "1404.2334"
