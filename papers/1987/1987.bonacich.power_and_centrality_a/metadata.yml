abstract: >
  Although network centrality is generally assumed to produce power, recent research shows that this is not the case in exchange networks. This paper proposes a generalization of the concept of centrality that accounts for both the usual positive relationship between power and centrality and Cook et al.'s recent exceptional results.
summary: >
  Introduces a parameterized family of centrality measures that can treat connections to well-connected actors as either advantageous or disadvantageous, depending on the network process being modeled. This makes the paper a core reference for power centrality and for distinguishing access-based centrality from bargaining or dependency-based power.
