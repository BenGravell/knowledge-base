title: "Optimal Stationary Control with State and Control Dependent Noise"
algorithm: "Multiplicative Noise LQR"
authors:
  - U. G. Haussmann
year: 1971
source: SIAM Journal on Control
type: Journal Paper
doi: 10.1137/0309016
tags:
