title: "On Curves of Minimal Length with a Constraint on Average Curvature, and with Prescribed Initial and Terminal Positions and Tangents"
algorithm: Dubins path
authors:
  - Lester E. Dubins
year: 1957
source: American Journal of Mathematics
type: Journal Paper
doi: 10.2307/2372560
tags:
