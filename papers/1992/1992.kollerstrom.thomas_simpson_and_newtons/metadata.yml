abstract: >
  A resurgence of interest has occurred in 'Newton's method of approximation' for deriving the roots of equations, as its repetitive and mechanical character permits ready computer use. If x = α is an approximate root of the equation f(x) = 0, then the method will in most cases give a better approximation as where f'(x) is the derivative of the function into which α has been substituted. Older books sometimes called it 'the Newton-Raphson method', although the method was invented essentially in the above form by Thomas Simpson, who published his account of the method in 1740. However, as if through a time-warp, this invention has migrated back in time and is now matter-of-factly placed by historians in Newton's De analysi of 1669. This paper will describe the steps of this curious historical transposition, and speculate as to its cause.
summary: >
  Argues that the iterative root-finding method commonly known as "Newton's method" was invented and published by Thomas Simpson in 1740, not by Isaac Newton. Newton's 1669 manuscript De analysi contains a different, non-iterative procedure; the modern method's misattribution to Newton is traced as an "enduring myth" and a curious historical transposition.
