title: Learning Latent Dynamics for Planning from Pixels
algorithm: PlaNet
authors:
  - Danijar Hafner
  - Timothy Lillicrap
  - Ian Fischer
  - Ruben Villegas
  - David Ha
  - Honglak Lee
  - James Davidson
year: 2018
source: International Conference on Machine Learning (ICML)
type: Conference Paper
doi:
arxiv_id: "1811.04551"
tags:
  - Model-based
  - Reinforcement learning
