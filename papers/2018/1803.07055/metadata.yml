title: "Simple Random Search Provides a Competitive Approach to Reinforcement Learning"
algorithm: ARS
authors:
  - Horia Mania
  - Aurelia Guy
  - Benjamin Recht
year: 2018
source: Neural Information Processing Systems (NeurIPS)
type: Conference Paper
doi: 10.5555/3326943.3327109
arxiv_id: "1803.07055"
tags:
