abstract: >
  The following theorem has recently been proved by Yamabe and Yujobo. Let f(x) be a real-valued continuous function defined on the surface S of an n-dimensional sphere with center Z in Euclidean (n + 1)-dimensional space R^{n+1}. Then there exist (n + 1) points x_0, x_1, ..., x_n on S such that the vectors Zx_0, ..., Zx_n are orthogonal and f(x_0) = f(x_1) = ... = f(x_n). This theorem was conjectured some years ago by Kakutani. He proved the case n = 2, generally known as Kakutani's theorem. The object of the present paper is to prove the following analog of Kakutani's theorem. Theorem. Let S be the surface of a sphere center Z in Euclidean 3-space R^3, and let f(x) be a continuous real-valued function defined on S. Then there exist four points x_1, x_2, x_3, x_4 on S forming the vertices of a square with center Z, such that f(x_1) = f(x_2) = f(x_3) = f(x_4). This theorem is stronger than Kakutani's theorem in that it requires 4 equal values of the function instead of 3. On the other hand, neither theorem is contained in the other. Presumably they will finally appear as two special cases of a more general theorem.
summary: >
  Dyson proves a Borsuk-Ulam-style theorem for continuous real-valued functions on the 2-sphere: there are four points on the sphere, forming the vertices of a square centered at the sphere's center, at which the function takes the same value. Equivalently, the theorem finds two perpendicular diameters of the sphere whose four endpoints share a common function value. The result sits in the line of Kakutani and Yamabe-Yujobo sphere theorems used in geometric existence problems, and Dyson's proof adapts their topological method through reflection and connectedness arguments rather than giving a constructive way to locate the square. The paper is also historically useful because it identifies the natural higher-dimensional conjecture, equal values on the endpoints of several mutually perpendicular diameters, while leaving that extension to later work by Yang.
