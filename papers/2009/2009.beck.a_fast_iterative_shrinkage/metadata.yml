abstract: >
summary: >
  Introduces FISTA (Fast Iterative Shrinkage-Thresholding Algorithm), an accelerated proximal gradient method achieving O(1/k²) convergence rate for composite convex minimization with a Lipschitz-smooth term and a proximal-friendly nonsmooth term such as L1 regularization. Extends ISTA with Nesterov-style momentum and became a foundational algorithm for sparse signal recovery and regularized optimization.
