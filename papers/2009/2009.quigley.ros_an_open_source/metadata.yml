abstract: >
  This paper gives an overview of ROS, an open-source robot operating system. ROS is not an operating
  system in the traditional sense of process management and scheduling; rather, it provides a
  structured communications layer above the host operating systems of a heterogeneous compute cluster.
  In this paper, we discuss how ROS relates to existing robot software frameworks, and briefly
  overview some of the available application software which uses ROS.
summary: >
  Introduces ROS as a robotics middleware rather than a traditional OS, emphasizing peer-to-peer
  communication, tools, language neutrality, and open-source integration. It became the dominant
  software substrate for academic and applied robotics.
