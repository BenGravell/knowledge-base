title: "Design of Linear Regulators for Nonlinear Stochastic Systems"
algorithm: "Stochastic LQR"
authors:
  - Donald E. Gustafson
  - Jason L. Speyer
year: 1975
source: Journal of Spacecraft and Rockets
type: Journal Paper
