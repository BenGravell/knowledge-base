summary: >
  Studies a generalized form of Halley's method for solving nonlinear equations F(x) = 0 in general spaces, using the generalized inverse approach. Presents Kantorovich-like convergence theorems, quasi-Halley variants, and numerical behavior studies of the iterative scheme.
