abstract: >
  We describe graph implementations, a generic method for representing a convex function via its epigraph, described in a disciplined convex programming framework. This simple and natural idea allows a very wide variety of smooth and nonsmooth convex programs to be easily specified and efficiently solved, using interior-point methods for smooth or cone convex programs.
summary: >
  Explains the graph-implementation idea behind disciplined convex programming systems: represent atoms by epigraph or cone-compatible graph forms so nonsmooth convex expressions can be reduced to solver-ready conic form. This is an important conceptual layer between convex analysis and practical modeling tools such as CVX.
