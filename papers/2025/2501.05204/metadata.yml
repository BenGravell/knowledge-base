title: "Design and Control of a Bipedal Robotic Character"
authors:
 - Ruben Grandia
 - Espen Knoop
 - Michael A. Hopkins
 - Georg Wiedebach
 - Jared Bishop
 - Steven Pickles
 - David Müller
 - Moritz Bächer
year: 2025
type: Conference Paper
arxiv_id: "2501.05204"
tags:
  - Robot
  - Disney
