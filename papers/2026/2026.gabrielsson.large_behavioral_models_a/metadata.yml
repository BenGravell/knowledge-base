abstract: >
  We introduce Large Behavioral Models (LBMs)—foundation models trained on chronological sequences of human actions. BehaviorGPT, a frontier LBM, delivers double-digit sales uplift for retailers and payment companies.
summary: >
  Defines Large Behavioral Models as foundation models that learn meaning from chronological sequences of human actions, transactions, and interaction logs rather than from static text or image co-occurrence alone. The paper positions BehaviorGPT as an example of this paradigm, arguing that behavior data provides a complementary and often orthogonal source of intelligence for enterprise tasks such as retail, payments, app usage, and workforce management.
